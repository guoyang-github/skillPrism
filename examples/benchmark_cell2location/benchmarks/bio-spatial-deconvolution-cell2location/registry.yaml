# Example benchmark registry for the cell2location spatial deconvolution skill.
# Uses synthetic Visium-like data generated by scripts/generate_data.py.

schema_version: "2.0"
cache_dir: ".benchmark_cache"

suites:
  smoke:
    description: Fast smoke tests using tiny synthetic data
    benchmarks:
      - c2l_level0_smoke
  gradual:
    description: Failure-mode-first progression from unit to release
    benchmarks:
      - c2l_level0_smoke
      - c2l_level1_small
      - c2l_level2_medium
  release:
    description: Release gate including real-data acceptance
    benchmarks:
      - c2l_level0_smoke
      - c2l_level1_small
      - c2l_level2_medium
      - c2l_level3_real_data

benchmarks:
  c2l_level0_smoke:
    name: "Level 0: tiny smoke test"
    skill: bio-spatial-deconvolution-cell2location
    task: deconvolution
    level: 0
    input:
      path: data/tiny
      description: 10 spots, 3 cell types; verifies output shape and basic validity
    expected:
      path: expected/tiny_proportions.csv
      format: csv
    metrics:
      - id: n_spots
        type: exact
        expected: 10
      - id: n_cell_types
        type: exact
        expected: 3

  c2l_level1_small:
    name: "Level 1: small mock regression"
    skill: bio-spatial-deconvolution-cell2location
    task: deconvolution
    level: 1
    input:
      path: data/small
      description: 50 spots, 5 cell types; checks RMSE against golden proportions
    expected:
      path: expected/small_proportions.csv
      format: csv
    metrics:
      - id: n_spots
        type: exact
        expected: 50
      - id: n_cell_types
        type: exact
        expected: 5
      - id: mean_rmse
        type: max
        threshold: 0.45

  c2l_level2_medium:
    name: "Level 2: medium mock integration"
    skill: bio-spatial-deconvolution-cell2location
    task: deconvolution
    level: 2
    input:
      path: data/medium
      description: 200 spots, 8 cell types; checks Pearson correlation
    expected:
      path: expected/medium_proportions.csv
      format: csv
    metrics:
      - id: n_spots
        type: exact
        expected: 200
      - id: n_cell_types
        type: exact
        expected: 8
      - id: mean_rmse
        type: max
        threshold: 0.40
      - id: min_pearson
        type: min
        threshold: 0.30

  c2l_level3_real_data:
    name: "Level 3: real Visium acceptance"
    skill: bio-spatial-deconvolution-cell2location
    task: deconvolution
    level: 3
    real_data: true
    requires_gpu: true
    input:
      path: data/real_visium
      description: User-supplied real Visium data; completion-only check
    expected:
      path: expected/real_proportions.csv
      format: csv
    metrics:
      - id: n_spots
        type: min
        threshold: 100
      - id: n_cell_types
        type: min
        threshold: 2
