# Quickstart benchmark registry for the csv-summary skill.
schema_version: "2.0"

cache_dir: ".benchmark_cache"

benchmarks:
  csv_summary_skill_md:
    name: CSV Summary SKILL.md Generation
    skill: csv-summary
    task: document
    level: 0
    input:
      path: data/csv_summary.txt
      description: Prompt asking the skill to write a SKILL.md for csv-summary
    expected:
      format: markdown
      path: expected/csv_summary.md
    metrics:
      - id: section_overlap
        name: Section overlap
        type: min
        threshold: 0.5
        description: Ratio of expected markdown headers present in output
      - id: token_jaccard
        name: Token Jaccard
        type: min
        threshold: 0.2
        description: Jaccard similarity of word token sets
      - id: length_ratio
        name: Length ratio
        type: range
        min: 0.3
        max: 3.0
        description: Output length divided by expected length
