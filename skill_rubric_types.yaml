# --------------------------------------------------------------------------- #
# Optional LLM-as-judge for subjective dimensions (D2, D5)
# --------------------------------------------------------------------------- #
# The engine remains provider-agnostic. Provide a command that reads a prompt
# from stdin and prints a JSON object: {"score": int, "reason": str}.
#
# Example command using an OpenAI-compatible endpoint:
#   llm_judge:
#     enabled: true
#     command: python examples/editor_wrappers/openai_compatible_judge.py
#     weight: 0.3
#
# Or set the environment variable:
#   export SKILLPRISM_LLM_JUDGE_COMMAND="python examples/editor_wrappers/openai_compatible_judge.py"
llm_judge:
  enabled: false
  # command: python examples/editor_wrappers/openai_compatible_judge.py
  weight: 0.3
  max_retries: 2
  outlier_threshold: 2
  require_reason: true
  n_judges: 2
  aggregate: median
  # Reproducibility metadata (optional; used by Agent-generated judgments).
  # model: moonshot-v1-8k
  # temperature: 0.2
  # prompt_version: "1.0"
  # system_prompt: "You are an expert reviewer..."
  # prompts:
  #   D2: "Evaluate the following SKILL.md for dimension {dimension} ({focus}). Engine score: {engine_score}/5."

editor:
  enabled: false
  # command: python scripts/my_skill_editor.py
  max_retries: 2

# --------------------------------------------------------------------------- #
# Optimization loop configuration
# --------------------------------------------------------------------------- #
optimization:
  priority:
    # Dimensions that must be fixed first when below the blocker threshold.
    blockers:
      - D9
    # High-ROI dimensions: easy to improve and yield large score gains.
    high_roi:
      - D4
      - D1
    # Score threshold below which a dimension is considered a blocker candidate.
    blocker_threshold: 2
    # Score threshold below which a dimension is considered needing improvement.
    improvement_threshold: 3
  clusters:
    # Dimensions that can be improved together in a single edit round.
    - name: documentation_callability
      dimensions: [D2, D6]
    - name: structure_dependencies
      dimensions: [D1, D4]
