    label: 元能力
    description: >-
      Framework-level or agent-interface skills that do not ship executable code.
      Examples: skill-prism itself, a prompt-engineering helper, or an agent
      coordination skill.
    detection:
      tool_type: [meta]
      keywords:
        - unified interface
        - agent interface
        - framework
        - skillprism
    frontmatter_recommended:
      - tool_type
    dimension_names_override:
      D3: 代码正确性
      D4: 工具依赖可复现
      D5: 领域准确性
      D7: 性能与资源友好
    enabled_dimensions:
      - D1
      - D2
      - D5
      - D6
      - D7
      - D9
    dimension_checks:
      D1:
        require_examples: false
        require_usage_guide: false
        dependency_file_candidates: []
      D7:
        resource_keywords:
          - memory
          - ram
          - resource
          - subset
          - downsample
          - large
          - 大规模
        speed_keywords:
          - slow
          - fast
          - speed
          - time
          - 性能
          - 耗时
        resource_sections:
          - resource
          - performance
          - requirement
          - runtime
          - limit
        robustness_sections:
          - error
          - robustness
          - failure
          - troubleshooting
          - handling
        parameter_sections:
