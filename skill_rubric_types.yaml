# Skill Rubric Type Configuration v2.0
# Project-agnostic type registry for the Skill evaluation framework.
#
# To add a new skill type:
#   1. Add a new entry under `skill_types`.
#   2. Define detection hints (tool_type, keywords, file_patterns).
#   3. Specify frontmatter requirements and recommended fields.
#   4. Provide per-dimension file/keyword checks.
#   5. (Optional) Add a new check function in evaluate_skill_rubric.py if needed.

schema_version: "2.0"

# --------------------------------------------------------------------------- #
# Scoring configuration - now configurable without touching the engine
# --------------------------------------------------------------------------- #
scoring:
  # Weights for each dimension. Must sum to 1.0.
  weights:
    D1: 0.10   # 目录与元数据规范
    D2: 0.15   # 文档可理解性
    D3: 0.18   # 可执行性/正确性
    D4: 0.12   # 环境/依赖可复现
    D5: 0.15   # 领域准确性
    D6: 0.10   # LLM 可调用性
    D7: 0.08   # 性能/资源/稳健性
    D8: 0.04   # 可维护性
    D9: 0.08   # 安全与可信

  # Grade thresholds (inclusive lower bound)
  grade_thresholds:
    A: 90
    B: 75
    C: 60

# --------------------------------------------------------------------------- #
# Note on LLM-driven verification / optimization
# --------------------------------------------------------------------------- #
# skillPrism does NOT call LLMs directly. If you want LLM-driven verification
# or optimization, implement it as an agent skill that reads SKILL.md and uses
# the agent's own LLM. The engine only provides objective measurement primitives.

# --------------------------------------------------------------------------- #
# Task templates (for reference / external LLM skill use)
# --------------------------------------------------------------------------- #
llm_tasks:
    - id: direct_task
      name: 直接任务
      prompt_template: |
        You are an AI agent that has access to the following skill:

        --- SKILL START ---
        {skill_md}
        --- SKILL END ---

        User task: {task_description}

        Please use this skill to complete the task. Output only the executable
        code/commands needed. Do not add explanations outside the code block.
      evaluation_criteria:
        - selects_correct_skill
        - code_is_runnable
        - output_is_reasonable

    - id: boundary_task
      name: 边界任务
      prompt_template: |
        You are an AI agent that has access to the following skill:

        --- SKILL START ---
        {skill_md}
        --- SKILL END ---

        User task: {task_description}

        The input has an edge case or missing information. Use the skill to
        handle it gracefully. Output executable code/commands only.
      evaluation_criteria:
        - detects_boundary
        - provides_fallback
        - code_is_runnable

    - id: error_recovery_task
      name: 错误恢复任务
      prompt_template: |
        You are an AI agent that has access to the following skill:

        --- SKILL START ---
        {skill_md}
        --- SKILL END ---

        The following error occurred when running code generated from this skill:

        {error_message}

        Please suggest a fix using the skill documentation. Output the corrected
        executable code/commands only.
      evaluation_criteria:
        - diagnoses_error
        - fix_is_correct
        - code_is_runnable

# --------------------------------------------------------------------------- #
# Security evaluator configuration (D9)
# Inspired by NVIDIA SkillSpector: static + optional LLM semantic analysis.
# --------------------------------------------------------------------------- #
security:
  # Static patterns to search for. Each pattern is a regex.
  # Severity maps to rubric score impact: critical/high reduce score more.
  static_patterns:
    - id: env_harvesting
      name: 环境变量收集
      severity: contextual
      patterns:
        - 'os\.environ'
        - 'os\.environ\.items'
        - 'os\.environ\.keys'
        - 'getenv\s*\('
      description: Skill 读取环境变量。通常是正常配置读取，但需确认是否收集敏感凭证。

    - id: external_transmission
      name: 外部网络传输
      severity: contextual
      patterns:
        - 'requests\.(post|put|patch)'
        - 'urllib\.request\.urlopen'
        - 'httpx\.(post|put|patch)'
        - 'socket\.'
      description: Skill 向外部地址发送数据。需结合场景判断是否为预期行为。

    - id: arbitrary_code_execution
      name: 任意代码执行
      severity: critical
      patterns:
        - '\beval\s*\('
        - '\bexec\s*\('
      description: Skill 使用 eval/exec 执行动态代码，属于无条件高风险操作。

    - id: subprocess_invocation
      name: 子进程/命令调用
      severity: contextual
      patterns:
        - 'subprocess\.call'
        - 'subprocess\.run'
        - 'subprocess\.Popen'
        - 'os\.system'
        - 'os\.popen'
      description: Skill 调用子进程或 shell 命令。常见于包装 CLI 工具的技能，需确认参数是否受控。

    - id: prompt_injection_marker
      name: 提示注入标记
      severity: medium
      patterns:
        - 'ignore previous instructions'
        - 'ignore the above'
        - 'system prompt'
        - 'developer message'
        - 'DAN'
        - 'jailbreak'
      description: 文档或代码中包含提示注入相关文本。

    - id: hardcoded_secret
      name: 硬编码密钥
      severity: high
      patterns:
        - '(?i)api[_-]?key\s*[:=]\s*[''"][a-zA-Z0-9]{16,}[''"]'
        - '(?i)password\s*[:=]\s*[''"][^''"]{6,}[''"]'
        - '(?i)token\s*[:=]\s*[''"][a-zA-Z0-9]{16,}[''"]'
        - '(?i)secret\s*[:=]\s*[''"][a-zA-Z0-9]{16,}[''"]'
        - '(?i)sk-[a-zA-Z0-9]{20,}'
      description: 代码或文档中疑似硬编码 API key / token / 密码。

    - id: file_traversal
      name: 路径遍历
      severity: contextual
      patterns:
        - '\.\./'
        - '~\/' 
      description: Skill 操作相对父目录或用户主目录路径。需确认是否在允许范围内。

    - id: excessive_agency
      name: 过度代理声明
      severity: medium
      patterns:
        - "run any command"
        - "execute arbitrary"
        - "full access"
        - "unrestricted"
      description: 文档中暗示 Skill 拥有过度权限。

  # Optional integration with external security scanner (e.g. SkillSpector).
  # If the CLI is available, the engine will call it and merge findings.
  external_scanner:
    name: skillspector
    install_hint: "pip install skillspector"
    command: ["skillspector", "scan", "{skill_path}", "--no-llm", "--format", "json"]
    # If external scanner is required, set required: true
    required: false

# --------------------------------------------------------------------------- #
# Frontmatter fields required for ALL skill types
# --------------------------------------------------------------------------- #
required_frontmatter_base:
  - name
  - description
  - keywords

# --------------------------------------------------------------------------- #
# Rubric dimension display names
# --------------------------------------------------------------------------- #
dimension_names:
  D1: 目录与元数据规范
  D2: 文档可理解性
  D3: 可执行性/正确性
  D4: 环境/依赖可复现
  D5: 领域准确性
  D6: LLM 可调用性
  D7: 性能/资源/稳健性
  D8: 可维护性
  D9: 安全与可信

